services:
  # === API Gateway (Nginx) ===
  # Semua traffic masuk melalui gateway ini (port 80)
  # Service internal TIDAK bisa diakses langsung dari luar
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # === Laravel App ===
  # Hanya bisa diakses via nginx (tidak ada port mapping ke host)
  app:
    build: .
    expose:
      - "8000"
    working_dir: /app
    volumes:
      - .:/app
      - vendor:/app/vendor
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mysql

  # === MySQL Database ===
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: cart_promo_service_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

volumes:
  vendor: